<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>KeyStone Field — Sign In</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0d1117;--card:#161b22;--border:rgba(255,255,255,.09);
  --text:#e6edf3;--muted:#8b949e;
  --accent:#38bdf8;--accent-l:rgba(56,189,248,.12);--accent-b:rgba(56,189,248,.28);
  --input-bg:#0d1117;--input-bdr:rgba(255,255,255,.12);
  --btn-bg:#38bdf8;--btn-txt:#0d1117;
  --error:#ef4444;--success:#34d399;
  --shadow:0 8px 32px rgba(0,0,0,.55);
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#f0f2f5;--card:#fff;--border:#e4e6eb;
  --text:#050505;--muted:#65676b;
  --accent:#1877F2;--accent-l:rgba(24,119,242,.08);--accent-b:rgba(24,119,242,.25);
  --input-bg:#fff;--input-bdr:#ccd0d5;
  --btn-bg:#1877F2;--btn-txt:#fff;
  --error:#dc2626;--success:#059669;
  --shadow:0 4px 20px rgba(0,0,0,.12);
  color-scheme:light;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;min-height:100%;
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.card{
  width:100%;max-width:420px;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:32px 28px;
  box-shadow:var(--shadow);
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center;}
.logo-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);}
.logo-name{
  font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;
  color:var(--text);letter-spacing:.01em;
}
/* Tab switcher */
.tabs{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px;}
.tab{
  flex:1;padding:9px;border-radius:7px;border:none;background:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .18s;
}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.15);}
[data-theme="light"] .tab.active{box-shadow:0 1px 4px rgba(0,0,0,.1);}

form{display:none;}
form.active{display:block;}

.field{margin-bottom:14px;}
.field label{
  display:block;margin-bottom:5px;
  font-size:12px;font-weight:600;color:var(--muted);
  letter-spacing:.02em;
}
.field input{
  width:100%;padding:10px 13px;
  background:var(--input-bg);border:1px solid var(--input-bdr);
  border-radius:9px;color:var(--text);
  font-family:'Inter',sans-serif;font-size:14px;outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--muted);}

.btn-submit{
  width:100%;padding:12px;margin-top:6px;
  background:var(--btn-bg);color:var(--btn-txt);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:800;
  border:none;border-radius:10px;cursor:pointer;letter-spacing:.02em;
  transition:opacity .15s,transform .12s;
}
.btn-submit:hover{opacity:.92;}
.btn-submit:active{transform:scale(.98);}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;}

.msg{
  margin-top:12px;padding:10px 13px;border-radius:8px;
  font-size:12px;font-weight:500;line-height:1.45;display:none;
}
.msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--error);}
.msg.info{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success);}
.msg.show{display:block;}

.footer-txt{
  margin-top:20px;text-align:center;font-size:11px;color:var(--muted);
}
.footer-txt a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-name">KeyStone Field</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="showTab('login')">Sign In</button>
    <button class="tab" id="tab-register" onclick="showTab('register')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="form-login" class="active" onsubmit="doLogin(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-submit" id="login-btn">Sign In</button>
    <div class="msg" id="login-msg"></div>
  </form>

  <!-- REGISTER FORM -->
  <form id="form-register" onsubmit="doRegister(event)">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Jane Smith" required autocomplete="name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>Password <span style="font-weight:400;opacity:.6">(min 6 characters)</span></label>
      <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn-submit" id="reg-btn">Create Account</button>
    <div class="msg" id="reg-msg"></div>
  </form>

  <div class="footer-txt">KeyStone Field Survey</div>
</div>

<script>
// Supabase URL + anon key are fetched from /api/config. Never hardcoded.
let SUPABASE_URL  = '';
let SUPABASE_ANON = '';
let sb = null;

async function loadSupabaseConfig() {
  try {
    const r = await fetch('/api/config', { cache: 'no-store' });
    if (!r.ok) return;
    const c = await r.json();
    SUPABASE_URL  = c.supabase_url || '';
    SUPABASE_ANON = c.supabase_anon_key || '';
  } catch (e) { console.error('Config load failed:', e); }
}

function redirectAfterLogin() {
  const mobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
    || window.innerWidth < 768;
  window.location.replace(mobile ? '/field/' : '/dashboard');
}

document.addEventListener('DOMContentLoaded', async () => {
  await loadSupabaseConfig();
  if (!SUPABASE_URL) return;
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data: { session } } = await sb.auth.getSession();
  if (session) redirectAfterLogin();
});

function showTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-register').classList.toggle('active', t === 'register');
  document.getElementById('form-login').classList.toggle('active', t === 'login');
  document.getElementById('form-register').classList.toggle('active', t === 'register');
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type} show`;
}

async function doLogin(e) {
  e.preventDefault();
  if (!sb) { redirectAfterLogin(); return; } // demo: skip auth
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('login-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    redirectAfterLogin();
  }
}

async function doRegister(e) {
  e.preventDefault();
  if (!sb) { showMsg('reg-msg', 'Supabase not configured. Set SUPABASE_URL and SUPABASE_ANON_KEY env vars.', 'error'); return; }
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';
  const { data, error } = await sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } },
  });
  if (error) {
    showMsg('reg-msg', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  } else if (data.session) {
    // Email confirmation disabled — user is signed in immediately
    window.location.href = 'index.html';
  } else {
    showMsg('reg-msg', 'Account created! You can now sign in.', 'info');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
