<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="Spatial Regression Diagnostics — OLS residuals + Moran scatter">
  <rect width="320" height="180" fill="#1a1a2e"/>
  <!-- Axes for Moran scatterplot (right half) -->
  <line x1="165" y1="20" x2="165" y2="165" stroke="#3a3a5a" stroke-width="1"/>
  <line x1="165" y1="92" x2="315" y2="92" stroke="#3a3a5a" stroke-width="1"/>
  <text x="240" y="175" text-anchor="middle" fill="#555" font-family="monospace" font-size="7.5">OLS Residual</text>
  <text x="158" y="92" text-anchor="end" fill="#555" font-family="monospace" font-size="7" transform="rotate(-90,158,92) translate(0,-10)">W·Residual</text>
  <text x="240" y="30" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="8">Moran I Scatterplot</text>
  <!-- Moran scatter points — positive spatial autocorrelation trend -->
  <g opacity="0.8">
    <circle cx="190" cy="68" r="3" fill="#0EA5E9"/><circle cx="200" cy="62" r="3" fill="#0EA5E9"/>
    <circle cx="215" cy="55" r="3.5" fill="#0EA5E9"/><circle cx="228" cy="48" r="3" fill="#0EA5E9"/>
    <circle cx="240" cy="42" r="3" fill="#0EA5E9"/><circle cx="250" cy="38" r="3.5" fill="#0EA5E9"/>
    <circle cx="263" cy="32" r="3" fill="#0EA5E9"/><circle cx="275" cy="27" r="3" fill="#0EA5E9"/>
    <circle cx="290" cy="22" r="3" fill="#0EA5E9"/>
    <circle cx="175" cy="115" r="3" fill="#f97316"/><circle cx="182" cy="120" r="3" fill="#f97316"/>
    <circle cx="195" cy="128" r="3.5" fill="#f97316"/><circle cx="210" cy="135" r="3" fill="#f97316"/>
    <circle cx="225" cy="140" r="3" fill="#f97316"/><circle cx="240" cy="145" r="3.5" fill="#f97316"/>
    <circle cx="255" cy="150" r="3" fill="#f97316"/><circle cx="270" cy="154" r="3" fill="#f97316"/>
  </g>
  <!-- Moran regression line — animated slope -->
  <line x1="170" y1="122" x2="305" y2="25" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.85">
    <animate attributeName="opacity" values="0.85;1;0.85;1;0.85" dur="2.5s" repeatCount="indefinite"/>
  </line>
  <!-- Model comparison bars (left half) -->
  <text x="80" y="30" text-anchor="middle" fill="#aaa" font-family="monospace" font-size="8">AIC Comparison</text>
  <!-- OLS bar -->
  <text x="20" y="55" fill="#888" font-family="monospace" font-size="7.5">OLS</text>
  <rect x="55" y="44" width="80" height="12" rx="2" fill="#f97316" opacity="0.6">
    <animate attributeName="width" values="0;80;80" dur="1.2s" repeatCount="indefinite" begin="0s"/>
  </rect>
  <text x="140" y="55" fill="#f97316" font-family="monospace" font-size="7.5">ΔAIC 8.2</text>
  <!-- Spatial Lag bar (winner) -->
  <text x="20" y="75" fill="#22c55e" font-family="monospace" font-size="7.5" font-weight="bold">Lag ✓</text>
  <rect x="55" y="64" width="55" height="12" rx="2" fill="#22c55e" opacity="0.8">
    <animate attributeName="width" values="0;55;55" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
  </rect>
  <text x="115" y="75" fill="#22c55e" font-family="monospace" font-size="7.5">best</text>
  <!-- Spatial Error bar -->
  <text x="20" y="95" fill="#888" font-family="monospace" font-size="7.5">Error</text>
  <rect x="55" y="84" width="62" height="12" rx="2" fill="#a78bfa" opacity="0.6">
    <animate attributeName="width" values="0;62;62" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </rect>
  <text x="122" y="95" fill="#a78bfa" font-family="monospace" font-size="7.5">ΔAIC 2.1</text>
  <!-- Moran I banner -->
  <rect x="8" y="108" width="150" height="28" rx="3" fill="#f59e0b" opacity="0.12"/>
  <rect x="8" y="108" width="150" height="28" rx="3" stroke="#f59e0b" stroke-width="0.8" fill="none" opacity="0.5"/>
  <text x="83" y="121" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="8">Moran I = 0.42  p = 0.001</text>
  <text x="83" y="132" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="7.5">Spatial model recommended</text>
  <!-- R² bars -->
  <text x="8" y="155" fill="#555" font-family="monospace" font-size="7">OLS R²</text>
  <rect x="48" y="147" width="42" height="7" rx="1.5" fill="#f97316" opacity="0.55"/>
  <text x="94" y="155" fill="#555" font-family="monospace" font-size="7">Lag R²</text>
  <rect x="118" y="147" width="55" height="7" rx="1.5" fill="#22c55e" opacity="0.7"/>
  <!-- Title -->
  <text x="160" y="14" text-anchor="middle" fill="#d0d0e8" font-family="monospace" font-size="10" font-weight="bold">Spatial Regression Diagnostics</text>
</svg>
