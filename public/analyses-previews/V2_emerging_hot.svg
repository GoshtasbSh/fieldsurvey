<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" width="320" height="180" role="img" aria-label="Emerging Hot Spot Analysis — temporal Gi* animation">
  <rect width="320" height="180" fill="#1a1a2e"/>
  <g stroke="#2a2a4a" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="45" x2="320" y2="45"/>
    <line x1="0" y1="90" x2="320" y2="90"/>
    <line x1="0" y1="135" x2="320" y2="135"/>
    <line x1="80" y1="0" x2="80" y2="180"/>
    <line x1="160" y1="0" x2="160" y2="180"/>
    <line x1="240" y1="0" x2="240" y2="180"/>
  </g>
  <!-- New Hot Spot — cool then heats -->
  <circle cx="75" cy="100" r="6" fill="#aaa" opacity="0.4">
    <animate attributeName="r" values="6;6;9;13;18;22;22" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.35;0.5;0.65;0.8;1"/>
    <animate attributeName="fill" values="#888;#74add1;#fdae61;#f46d43;#d73027;#d73027;#d73027" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.35;0.5;0.65;0.8;1"/>
    <animate attributeName="opacity" values="0.4;0.55;0.7;0.85;1;1;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.35;0.5;0.65;0.8;1"/>
  </circle>
  <!-- Persistent Hot Spot -->
  <circle cx="180" cy="60" r="20" fill="#d73027" opacity="0.9">
    <animate attributeName="r" values="20;22;20;22;20;22;20" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9;1;0.9;1;0.9" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <!-- Intensifying Cold Spot -->
  <circle cx="255" cy="130" r="5" fill="#888" opacity="0.35">
    <animate attributeName="r" values="5;7;11;15;18;18;18" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.6;0.75;0.9;1"/>
    <animate attributeName="fill" values="#888;#abd9e9;#74add1;#4575b4;#4575b4;#4575b4;#4575b4" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.6;0.75;0.9;1"/>
    <animate attributeName="opacity" values="0.35;0.55;0.7;0.88;0.95;0.95;0.95" dur="4s" repeatCount="indefinite" keyTimes="0;0.2;0.4;0.6;0.75;0.9;1"/>
  </circle>
  <!-- Historical Hot Spot — fades -->
  <circle cx="290" cy="55" r="13" fill="#fecc5c" opacity="0.75">
    <animate attributeName="opacity" values="0.75;0.55;0.35;0.2;0.2;0.35;0.55;0.75" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- No pattern dots -->
  <circle cx="130" cy="145" r="4" fill="#666" opacity="0.45"/>
  <circle cx="210" cy="115" r="3.5" fill="#666" opacity="0.4"/>
  <circle cx="40" cy="55" r="4" fill="#666" opacity="0.4"/>
  <circle cx="310" cy="160" r="3" fill="#666" opacity="0.35"/>
  <!-- Labels -->
  <text x="160" y="16" text-anchor="middle" fill="#d0d0e8" font-family="monospace" font-size="10" font-weight="bold">Emerging Hot Spot Analysis</text>
  <text x="160" y="27" text-anchor="middle" fill="#666" font-family="monospace" font-size="8">Temporal Gi* · Mann-Kendall trend · 13 categories</text>
  <!-- Mini legend -->
  <rect x="6" y="34" width="96" height="52" rx="3" fill="#0d0d20" opacity="0.85"/>
  <circle cx="16" cy="44" r="5" fill="#d73027" opacity="0.95"/>
  <text x="24" y="48" fill="#ccc" font-family="monospace" font-size="7.5">Persistent Hot Spot</text>
  <circle cx="16" cy="58" r="5" fill="#f46d43" opacity="0.9"/>
  <text x="24" y="62" fill="#ccc" font-family="monospace" font-size="7.5">New / Intensifying</text>
  <circle cx="16" cy="72" r="5" fill="#4575b4" opacity="0.9"/>
  <text x="24" y="76" fill="#ccc" font-family="monospace" font-size="7.5">Cold Spot</text>
  <circle cx="16" cy="80" r="5" fill="#fecc5c" opacity="0.75"/>
  <text x="24" y="84" fill="#ccc" font-family="monospace" font-size="7.5">Historical</text>
  <text x="160" y="174" text-anchor="middle" fill="#555" font-family="monospace" font-size="8">Time →</text>
</svg>
