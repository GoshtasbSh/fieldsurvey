<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#1a1a2e"/>
  <text x="10" y="18" fill="#94a3b8" font-size="11" font-family="monospace">Weighted vs Unweighted</text>
  <rect x="20" width="18" fill="#60a5fa" rx="2"><animate attributeName="height" from="0" to="80" dur="0.5s" fill="freeze"/><animate attributeName="y" from="120" to="40" dur="0.5s" fill="freeze"/></rect>
  <rect x="50" width="18" fill="#60a5fa" rx="2"><animate attributeName="height" from="0" to="60" dur="0.5s" begin="0.1s" fill="freeze"/><animate attributeName="y" from="120" to="60" dur="0.5s" begin="0.1s" fill="freeze"/></rect>
  <rect x="80" width="18" fill="#60a5fa" rx="2"><animate attributeName="height" from="0" to="45" dur="0.5s" begin="0.2s" fill="freeze"/><animate attributeName="y" from="120" to="75" dur="0.5s" begin="0.2s" fill="freeze"/></rect>
  <rect x="170" width="18" fill="#f59e0b" rx="2"><animate attributeName="height" from="0" to="70" dur="0.5s" begin="0.4s" fill="freeze"/><animate attributeName="y" from="120" to="50" dur="0.5s" begin="0.4s" fill="freeze"/></rect>
  <rect x="200" width="18" fill="#f59e0b" rx="2"><animate attributeName="height" from="0" to="75" dur="0.5s" begin="0.5s" fill="freeze"/><animate attributeName="y" from="120" to="45" dur="0.5s" begin="0.5s" fill="freeze"/></rect>
  <rect x="230" width="18" fill="#f59e0b" rx="2"><animate attributeName="height" from="0" to="55" dur="0.5s" begin="0.6s" fill="freeze"/><animate attributeName="y" from="120" to="65" dur="0.5s" begin="0.6s" fill="freeze"/></rect>
  <line x1="10" y1="120" x2="295" y2="120" stroke="#334155" stroke-width="1"/>
  <text x="20" y="140" fill="#60a5fa" font-size="9" font-family="monospace">Raw</text>
  <text x="170" y="140" fill="#f59e0b" font-size="9" font-family="monospace">Weighted</text>
  <line x1="150" y1="25" x2="150" y2="130" stroke="#334155" stroke-width="1"/>
</svg>
